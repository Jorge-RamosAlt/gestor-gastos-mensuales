<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Gastos Mensuales</title>

    <!-- ── Seguridad ── -->
    <!--
      La Content Security Policy completa se aplica como HTTP header desde
      firebase.json (más efectivo y soporte para frame-ancestors).
      Este meta tag actúa como fallback para navegadores / entornos sin headers.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'wasm-unsafe-eval' https://apis.google.com https://www.google.com https://www.gstatic.com;
      style-src 'self' 'unsafe-inline';
      worker-src 'self' blob:;
      connect-src 'self'
        https://tessdata.projectnaptha.com
        https://*.googleapis.com
        https://*.firebaseio.com
        https://*.firebase.com
        https://*.firebaseapp.com
        https://securetoken.googleapis.com
        https://identitytoolkit.googleapis.com
        https://accounts.google.com
        https://oauth2.googleapis.com
        wss://*.firebaseio.com;
      img-src 'self' data: blob: https://*.googleusercontent.com;
      font-src 'self';
      object-src 'none';
      base-uri 'self';
      form-action 'self' https://*.firebaseapp.com https://accounts.google.com;
      frame-src https://accounts.google.com https://*.firebaseapp.com https://*.googleapis.com;
      upgrade-insecure-requests;
    " />

    <!-- Evita que navegadores antiguos detecten MIME types incorrectamente -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Controla la información de referrer enviada en requests -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Descripción para SEO / LinkedIn cuando compartas el proyecto -->
    <meta name="description"
          content="Gestor de gastos mensuales personal con análisis por categoría, importación de documentos y comparación mensual." />
    <meta name="author" content="Jorge Ramos" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
